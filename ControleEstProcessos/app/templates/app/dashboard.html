{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CEP</title>
    
    <meta name="processo-id" content="{{ view.kwargs.pk }}">
    <meta name="description" content="Dashboard de Controle Estatístico de Processos — visualização de cartas de controle com memória de cálculo.">
    
    <link rel="stylesheet" href="{% static 'app/css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <p class="print-title">Relatório de Controle Estatístico de Processos</p>
        <div class="header">
            <h2 id="tituloProcesso" class="loading">Carregando processo...</h2>
            <div class="header-actions">
                <button class="btn btn-export" onclick="exportarRelatorio()" id="btnExport" style="display:none;">
                    📄 Exportar Relatório
                </button>
                <button class="btn" id="btnToggleLeds" onclick="toggleLeds()" style="background-color: #ff9800; color: white;">
                    💡 Leds: Carregando...
                </button>
                <a href="{% url 'index' %}" class="btn btn-back">&larr; Voltar ao Menu</a>
            </div>
        </div>
        
        <div id="chartContainer"></div>
        <div id="memoriaCalculo"></div>
    </div>

    <script src="{% static 'app/js/chart_common.js' %}"></script>
    <script src="{% static 'app/js/dashboard.js' %}"></script>
    <script>
        // Lógica do botão de LEDs
        const btnLeds = document.getElementById('btnToggleLeds');

        function updateBtnLeds(state) {
            if (state) {
                btnLeds.innerHTML = "💡 Alertas LEDs: ON";
                btnLeds.style.backgroundColor = "#4CAF50";
            } else {
                btnLeds.innerHTML = "💡 Alertas LEDs: OFF";
                btnLeds.style.backgroundColor = "#f44336";
            }
        }

        function carregarLeds() {
            fetch('/api/toggle-leds/')
                .then(r => r.json())
                .then(data => updateBtnLeds(data.leds_on))
                .catch(e => console.error(e));
        }

        function toggleLeds() {
            btnLeds.innerHTML = "Aguarde...";
            fetch('/api/toggle-leds/', { method: 'POST' })
                .then(r => r.json())
                .then(data => updateBtnLeds(data.leds_on))
                .catch(e => {
                    console.error(e);
                    alert("Erro ao alterar LEDs");
                });
        }

        // Carrega o estado atual assim que a página abrir
        document.addEventListener('DOMContentLoaded', carregarLeds);
    </script>
</body>
</html>
